<!DOCTYPE html>
<html>
<head>
  <title>DAWG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/main.css">
  
</head>
<body>
  <header>
    <section class = "header-left-section">
      <a class = "header-logo-link" href = "/">
        <div class = "logo">DAWG</div>
      </a>
    </section>
    <section class = "header-middle-section">
      <input class = "search-bar" type = "text" placeholder = "Search">
    </section>
    <section class = "header-right-section">
      <div class = "custom-label">
        <label for="genre-filter">Genre:</label>
        <select class = "custom-select" id = "genre-filter">
          <option value="Action">Action</option>
          <option value="Action">Shooter</option>
          <option value="Action">RPG</option>
          <option value="Action">Indie</option>
        </select>
      </div>
    </section>
  </header>
  <main>
    <div class = "library-container">
      <h1 class = "catalogue-heading">Catalogue</h1>
      <div class = "games-grid js-games-grid"></div>
    </div>
    
    <div class = "wishlist-container js-wishlist-container">
      <h1 class = "wishlist-heading">Your Wishlist</h1>     
      <div class = "wishlist-grid js-wishlist-grid"></div>
    </div>
  </main>
  <script type = "module" src = "home.js"></script>
</body>
</html>
